          \  # ぶれ許容量:char_tolerance\n    \n    min_dif_plus_pr_contents = []\n   \
          \ iteration_lengths = []\n    min_dif = float('inf')\n    for json_str in\
          \ iteration_result:\n        if json_str == '':\n            continue\n\n\
          \        data = json.loads(json_str)\n        contents = data['plus_pr_contents']\
          \ # 文字列を配列に変換\n\n        total_length = sum([len(content) for content in\
          \ contents if content is not None])\n        dif = total_length - max_length\
          \  # 既定文字数との差異を計算\n        is_valid = max_length >= total_length >= min_length\n\
          \n        iteration_lengths.append(total_length)\n        min_dif_plus_pr_contents.append((is_valid,\
          \ dif, total_length, json_str))\n    \n    def custom_sort(elem1, elem2):\n\
          \        \"\"\"\n        カスタムの比較関数。\n        is_validの降順->difが0に近い順に並べ替え\n\
          \        \"\"\"\n        # bool値で比較\n        if elem1[0] != elem2[0]:\n\
          \            return elem2[0] - elem1[0]  # Trueを上位にする\n\n        # int値で比較\
          \ (0に近い方を上位にする)\n        diff1 = abs(elem1[1])\n        diff2 = abs(elem2[1])\n\
          \        if diff1 != diff2:\n            return diff1 - diff2\n\n      \
          \  # ここまで来たら、boolとintが同じ\n        return True\n\n    # is_validの降順->difが0に近い順に並べ替え（カスタムの比較関数を使ってソート）\n\
          \    # 既定の文字数範囲内の一番長いものが1番目に来る\n    # すべて既定の文字数範囲外であれば最大文字数に一番近いものが1番目に来る\n\
          \    sorted_list = sorted(min_dif_plus_pr_contents, key=functools.cmp_to_key(custom_sort))\n\
          \    total_length = sorted_list[0][2]\n    result = sorted_list[0][3]\n\
          \    is_valid = max_length + char_tolerance >= total_length >= min_length\n\
          \n    return {\n        \"is_valid\": is_valid,\n        \"result\": result,\n\
          \        \"result_length\": total_length,\n        \"iteration_lengths\"\
          : iteration_lengths, # 動作確認用に全パターンの文字数を出力\n    }\n"
