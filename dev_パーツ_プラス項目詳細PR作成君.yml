    - data:
        code: "def main(json1: str, json2: str, json3: str) -> dict:\n    import json\n\
          \    import ast\n\n    def find_keys_in_json(json_data, target_keys):\n\
          \        results = {}\n        \n        # 再帰的にJSONデータを探索する関数\n        def\
          \ recursive_search(data):\n            if isinstance(data, dict):  # 辞書の場合\n\
          \                for key, value in data.items():\n                    #\
          \ キーを小文字に変換して比較\n                    if key.lower() in [k.lower() for k\
          \ in target_keys]:\n                        results[key] = value\n     \
          \               recursive_search(value)\n            elif isinstance(data,\
          \ list):  # リストの場合\n                for item in data:\n                \
          \    recursive_search(item)\n        \n        # 再帰探索を開始\n        recursive_search(json_data)\n\
          \        return results\n\n    # JSON文字列を辞書に変換\n    data1 = json.loads(json1)\n\
          \    data2 = json.loads(json2)\n    data3 = json.loads(json3)\n\n    # 対象のキーを指定して取得\n\
          \    data1 = find_keys_in_json(data1, [\"pr_content1\"])\n    data2 = find_keys_in_json(data2,\
          \ [\"pr_content2\"])\n    data3 = find_keys_in_json(data3, [\"pr_content3\"\
          ])\n    \n    pr_content1 = data1.get(\"pr_content1\")\n    pr_content2\
          \ = data2.get(\"pr_content2\")\n    pr_content3 = data3.get(\"pr_content3\"\
          )\n    \n    plus_pr_contents = {\n        \"plus_pr_contents\": [pr_content1,\
          \ pr_content2, pr_content3]\n    }\n    \n    # 結果を返す\n    return {\n  \
          \      \"plus_pr_contents\": json.dumps(plus_pr_contents, ensure_ascii=False),\n\
          \    }"
