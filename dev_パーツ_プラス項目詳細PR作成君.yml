          role: user
          text: 'あなたは効果的な広告文章を作成するAIアシスタントです。与えられた情報を基に、ターゲットに響くお店の特長を引き出し、集客につながるような魅力的な広告文章を作成することが目標です。


            以下の情報をよく確認してください：


            店舗メモ：

            <store_memo>

            {{#1737595399740.pr1_memo#}}

            </store_memo>


            アウトライン：

            <outline>

            {{#1737595736438.outline1#}}

            </outline>


            事前情報の分析結果：

            <analysis_results>

            {{#1730618336797.plan#}}

            </analysis_results>


            掲載してはいけない情報とその理由：

            <no_publish>

            {{#1730618336797.no_publish#}}

            </no_publish>


            目標文字数：

            <pr_text_target_character_count>

            {{#1737595837735.pr1_length#}}

            </pr_text_target_character_count>


            タスクの手順：

            1. 提供された情報を確認し、理解します。

            2. <analysis_results>に含まれるSEOキーワードと地域キーワードを確認します。

            3. アウトラインのPRポイントについて広告文章を作成します。

            4. 作成した文章をチェックし、必要に応じて修正します。

            5. 指定されたJSON形式で出力します。


            広告文章作成の詳細な手順：


            1. SEOキーワードと地域キーワードを効果的に組み込むよう心がけてください。

            - キーワードを組み込む際は、<store_memo>や<outline>に記載のない内容を推測や補完により追加することはしないでください。

            - キーワードを組み込む際は、<store_memo>と<outline>に矛盾がないかを必ず確認し、虚偽の内容とならないように注意してください。

            - キーワードを使うことで事実と合わない表現になる場合、該当キーワードは無理に使用しないでください。


            2. アウトラインのPRポイントについて、以下の点に注意しながら文章を作成してください：

            - <store_memo>と<outline>に含まれる情報のみを使用し、虚偽や過度な誇張表現を避けてください。

            - <no_publish> に示された情報は使用せず、文章に含めないでください。

            - PR文章は<pr_text_target_character_count>±10文字の長さで作成してください。

            - タイトルは別で作成するため、見出しを付けないでください。

            - 以下の文章の条件を遵守してください：

            ・文末に「！」「♪」「◎」を使用する際は、それぞれ3か所以内とすること。

            ・文末に「！」「♪」「◎」を使用する文は、必要に応じて体言止めにすること。

            ・文調は、やや親しみやすい表現にすること。

            ・店員目線の文章とし、一人称は「当店」とすること。

            ・一文は20文字程度に調整すること。


            3. 作成した文章をチェックし、以下の点を確認し、必要に応じて修正してください:

            - 虚偽や過度な誇張表現が含まれていないか

            - 掲載してはいけない情報に該当する記述が含まれていないか

            - PR文章の文字数と文字数を数え、報告してください

            - 作成した文章が<pr_text_target_character_count>±10文字の範囲に収まるように調整してください


            4. 最終的な出力は以下のJSON形式で行ってください：

            {

            "pr_content1": "PR文章"

            }


            注意事項：

            - 常に<store_memo>と<outline>の情報に基づいて文章を作成し、**事実に基づいた記述**を心がけてください。

            - <analysis_results>から抽出したSEOキーワードや地域キーワードを使う際は、<store_memo>や<outline>と矛盾しないかを厳重に確認してください。

            - PR文章の文字数が<pr_text_target_character_count>+10文字を超える場合は、情報を減らしたり、言い回しの変更を行って調整してください。

            - PR文章の文字数が<pr_text_target_character_count>+10文字を下回る場合は、<store_memo>をもとに情報を追加したり、言い回しの変更を行って調整してください。

            - 出力は必ず指定されたJSON形式に従ってください。余計なコメントや情報は出力しないでください。


            それでは、与えられた情報を基に魅力的な広告文章を作成してください。'
